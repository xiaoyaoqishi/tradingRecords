<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 · 骁遥骑士</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Songti SC', 'STSong', 'Noto Serif SC', serif;
      min-height: 100vh;
      overflow: hidden;
      color: #3a3a3a;
      background: #d1cbc0;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: rgba(255, 255, 255, 0.38);
    }

    .video-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      filter: saturate(0.86) contrast(0.95);
    }

    .content {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .login-panel {
      width: 460px;
      max-width: 92vw;
      padding: 56px 52px 52px;
      position: relative;
      background: rgba(245, 240, 232, 0.14);
      backdrop-filter: none;
    }
    .login-panel::before,
    .login-panel::after {
      display: none;
    }
    .login-panel::before { top: 0; }
    .login-panel::after { bottom: 0; }

    .login-seal {
      width: 84px;
      height: 84px;
      border: 2px solid rgba(175, 75, 55, 0.45);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'KaiTi', 'STKaiti', 'Songti SC', serif;
      font-size: 36px;
      color: rgba(175, 75, 55, 0.6);
      margin: 0 auto 24px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-header h1 {
      font-family: 'KaiTi', 'STKaiti', 'Songti SC', serif;
      font-size: 2.4rem;
      font-weight: 400;
      letter-spacing: 0.5rem;
      color: #3a3530;
      margin-bottom: 12px;
    }

    .login-header .subtitle {
      font-size: 0.95rem;
      color: #8a7d6b;
      letter-spacing: 0.25rem;
    }

    .login-header h1,
    .login-header .subtitle,
    .form-group label,
    .footer {
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.9), 0 0 4px rgba(255, 255, 255, 0.8);
    }

    .form-group {
      margin-bottom: 28px;
    }

    .form-group label {
      display: block;
      font-size: 0.9rem;
      color: #7a7060;
      margin-bottom: 10px;
      letter-spacing: 0.12rem;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      padding: 14px 6px;
      border: none;
      border-bottom: 1px solid rgba(120, 105, 85, 0.35);
      background: rgba(250, 245, 238, 0.15);
      font-size: 1.05rem;
      font-family: inherit;
      color: #3a3a3a;
      outline: none;
      transition: border-color 0.3s, background 0.3s;
    }

    .input-wrap input:focus {
      border-bottom-color: rgba(100, 85, 60, 0.7);
      background: rgba(250, 245, 238, 0.25);
    }

    .input-wrap input::placeholder {
      color: #b0a590;
    }

    .input-wrap .toggle-pwd {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      background: none;
      border: none;
      color: #8a7d6b;
      font-size: 1.1rem;
      padding: 4px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    .input-wrap .toggle-pwd:hover {
      color: #5a5040;
    }

    .input-wrap .toggle-pwd svg {
      width: 22px;
      height: 22px;
    }

    .btn-login {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 2px;
      background: linear-gradient(135deg, #7a7060, #5a5040);
      color: #f0ebe0;
      font-family: inherit;
      font-size: 1.1rem;
      letter-spacing: 0.3rem;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 16px;
    }

    .btn-login:hover {
      background: linear-gradient(135deg, #6a6050, #4a4030);
      box-shadow: 0 4px 16px rgba(80, 60, 30, 0.25);
      transform: translateY(-1px);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      color: #a05040;
      font-size: 0.88rem;
      text-align: center;
      margin-top: 16px;
      min-height: 1.2em;
      letter-spacing: 0.05rem;
    }

    .footer {
      position: fixed;
      bottom: 2rem;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 10;
      color: #8a7d6b;
      font-size: 0.9rem;
      letter-spacing: 0.35rem;
      font-style: italic;
    }

    @media (max-width: 520px) {
      .login-panel { padding: 40px 28px 34px; }
      .login-header h1 { font-size: 1.8rem; }
      .login-seal { width: 68px; height: 68px; font-size: 28px; }
    }
  </style>
</head>
<body>

<video class="video-bg" autoplay muted loop playsinline preload="auto" aria-hidden="true">
  <source src="/assets/ink-bg-loop.mp4" type="video/mp4">
</video>

<div class="content">
  <div class="login-panel">
    <div class="login-seal">骁</div>
    <div class="login-header">
      <h1>骁遥骑士</h1>
      <div class="subtitle">请登录以继续</div>
    </div>

    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label for="username">用户名</label>
        <div class="input-wrap">
          <input type="text" id="username" name="username" placeholder="请输入用户名" autocomplete="username" required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">密码</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" placeholder="请输入密码" autocomplete="current-password" required>
          <button type="button" class="toggle-pwd" id="togglePwd" title="显示/隐藏密码">
            <svg id="eyeOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
            <svg id="eyeOn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="btnLogin">登 录</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>
  </div>
</div>

<div class="footer">行到水穷处 坐看云起时</div>

<script>
  const bgVideo = document.querySelector('.video-bg');
  if (bgVideo) {
    bgVideo.play().catch(() => {});
  }

  const pwdInput = document.getElementById('password');
  const toggleBtn = document.getElementById('togglePwd');
  const eyeOff = document.getElementById('eyeOff');
  const eyeOn = document.getElementById('eyeOn');

  toggleBtn.addEventListener('click', () => {
    const showing = pwdInput.type === 'text';
    pwdInput.type = showing ? 'password' : 'text';
    eyeOff.style.display = showing ? '' : 'none';
    eyeOn.style.display = showing ? 'none' : '';
    pwdInput.focus();
  });

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnLogin');
    const errEl = document.getElementById('errorMsg');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) {
      errEl.textContent = '请填写用户名和密码';
      return;
    }

    btn.disabled = true;
    btn.textContent = '登录中…';
    errEl.textContent = '';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();
      if (res.ok) {
        const redirectRaw = new URLSearchParams(location.search).get('redirect');
        const redirect = (!redirectRaw || redirectRaw === '/trading' || redirectRaw === '/trading/') ? '/' : redirectRaw;
        location.href = redirect;
      } else {
        errEl.textContent = data.detail || '登录失败';
      }
    } catch {
      errEl.textContent = '网络连接失败，请重试';
    } finally {
      btn.disabled = false;
      btn.textContent = '登 录';
    }
  });

  (async () => {
    try {
      const res = await fetch('/api/auth/check');
      const data = await res.json();
      if (data.authenticated) {
        location.href = '/';
      }
    } catch {}
  })();
</script>

</body>
</html>
