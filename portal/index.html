<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人工作台</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%234a4035'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-size='34' fill='white'%3E台%3C/text%3E%3C/svg%3E" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Songti SC', 'STSong', 'Noto Serif SC', serif;
      color: #2f2c28;
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
      background: #d1cbc0;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: rgba(255, 255, 255, 0.38);
    }
    body.auth-pending .shell,
    body.auth-pending .logout-btn {
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
    }

    .video-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      filter: saturate(0.84) contrast(0.94);
    }

    .shell {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 4vh 6vw 3vh;
    }

    /* ── 顶栏 ── */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .brand h1 {
      font-family: 'KaiTi', 'STKaiti', 'Songti SC', serif;
      font-size: clamp(36px, 5vw, 64px);
      font-weight: 400;
      letter-spacing: 0.6rem;
      color: #3a3530;
    }

    .brand .slogan {
      margin-top: 10px;
      font-size: clamp(14px, 1.4vw, 17px);
      letter-spacing: 0.3rem;
      color: #6a6258;
    }

    .clock {
      text-align: right;
      color: #4a4440;
      margin-top: 4px;
    }
    .clock .date {
      font-size: clamp(16px, 1.6vw, 22px);
      letter-spacing: 0.15rem;
    }
    .clock .time {
      font-family: 'KaiTi', 'STKaiti', 'Songti SC', serif;
      font-size: clamp(40px, 5.5vw, 60px);
      font-weight: 300;
      margin-top: 4px;
      letter-spacing: 0.15rem;
    }

    .brand h1,
    .brand .slogan,
    .clock .date,
    .clock .time,
    .poem .title,
    .poem .line,
    .poem .meta,
    .nav-item .name,
    .nav-item .desc {
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.9), 0 0 4px rgba(255, 255, 255, 0.8);
    }

    /* ── 中部主区域：撑满剩余空间，居中诗词 ── */
    .main-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2vh 0;
    }

    /* ── 诗词区：居中、楷体、大字 ── */
    .poem {
      width: min(940px, 94%);
      padding: 24px 16px;
      position: relative;
      background: transparent;
      backdrop-filter: none;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .poem::before,
    .poem::after {
      display: none;
    }
    .poem::before { top: 0; }
    .poem::after { bottom: 0; }

    .poem .title {
      font-size: clamp(16px, 1.6vw, 20px);
      color: #847762;
      letter-spacing: 2px;
      writing-mode: vertical-rl;
      text-orientation: upright;
      line-height: 1.8;
    }
    .poem-head {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      margin-bottom: 0;
      height: clamp(280px, 52vh, 520px);
    }

    .poem-vertical-wrap {
      display: flex;
      flex-direction: row-reverse;
      align-items: flex-start;
      justify-content: center;
      gap: 18px;
      max-width: 100%;
      min-height: clamp(280px, 52vh, 520px);
    }
    .poem-action-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid rgba(126, 114, 97, 0.25);
      background: transparent;
      color: #7c7265;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s;
    }
    .poem-action-btn:hover {
      color: #5f5548;
      border-color: rgba(126, 114, 97, 0.5);
      background: rgba(245, 240, 232, 0.3);
    }

    .poem .line {
      font-family: 'KaiTi', 'STKaiti', 'AR PL UKai CN', 'Noto Serif SC', serif;
      font-size: clamp(24px, 3vw, 32px);
      line-height: 2.1;
      letter-spacing: 2px;
      color: #2e2a25;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      white-space: pre-wrap;
      height: clamp(280px, 52vh, 520px);
      max-width: min(72vw, 14em);
      overflow: hidden;
      margin: 0;
      text-align: left;
    }
    .poem .line.collapsed {
      max-width: min(72vw, 14em);
      overflow: hidden;
      position: relative;
    }
    .poem .line.expanded {
      max-width: min(88vw, 34em);
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 6px;
    }
    .poem .line.collapsed::after {
      content: none;
    }
    .poem .meta {
      margin-top: 0;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      color: #6d6152;
      font-size: clamp(13px, 1.1vw, 15px);
      letter-spacing: 1px;
      line-height: 1.9;
      align-self: flex-end;
      opacity: 0.96;
    }
    .poem-toggle.expanded {
      color: #5f5548;
      border-color: rgba(126, 114, 97, 0.55);
      background: rgba(245, 240, 232, 0.32);
      transform: rotate(180deg);
    }

    /* ── 导航区：印章 + 墨线 ── */
    .nav-row {
      padding-top: 2vh;
      padding-bottom: 1vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-item {
      flex: 0 1 300px;
      text-decoration: none;
      color: #3a3530;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 24px;
      position: relative;
      transition: all 0.4s ease;
    }
    .nav-item::before {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.14);
      box-shadow: 0 0 16px rgba(255, 255, 255, 0.24);
      opacity: 0;
      transition: opacity 0.4s ease;
      z-index: 0;
    }
    .nav-item:hover::before { opacity: 1; }

    .nav-separator {
      width: 1px;
      height: 72px;
      background: linear-gradient(180deg, transparent, rgba(100,90,75,0.3), transparent);
      flex-shrink: 0;
    }

    .nav-item .seal {
      width: 60px;
      height: 60px;
      border: 1.5px solid rgba(175, 75, 55, 0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 27px;
      color: rgba(175, 75, 55, 0.55);
      margin-bottom: 14px;
      position: relative;
      z-index: 1;
      transition: all 0.35s ease;
    }
    .nav-item:hover .seal {
      color: rgba(175, 75, 55, 0.8);
      border-color: rgba(175, 75, 55, 0.65);
      transform: scale(1.06);
    }

    .nav-item .name {
      font-size: clamp(20px, 2.2vw, 28px);
      letter-spacing: 0.35rem;
      font-weight: 500;
      position: relative;
      z-index: 1;
    }

    .nav-item .desc {
      font-size: 15px;
      color: #655b4f;
      margin-top: 10px;
      letter-spacing: 0.08rem;
      text-align: center;
      line-height: 1.6;
      position: relative;
      z-index: 1;
    }

    /* ── 退出 ── */
    .logout-btn {
      position: fixed;
      right: 24px;
      bottom: 24px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid rgba(120, 107, 89, 0.3);
      background: rgba(245, 240, 232, 0.2);
      backdrop-filter: blur(8px);
      color: #6a6258;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      transition: all 0.25s;
    }
    .logout-btn:hover {
      color: #a24b42;
      background: rgba(245, 240, 232, 0.4);
    }

    /* ── 响应式 ── */
    @media (max-width: 980px) {
      body { overflow: auto; }
      .shell { padding: 20px 16px 16px; min-height: auto; }
      .topbar { flex-direction: column; gap: 12px; }
      .clock { text-align: left; }
      .main-area { padding: 2vh 0; }
      .nav-row {
        flex-direction: column;
        gap: 0;
        align-items: stretch;
      }
      .nav-separator {
        width: 60px;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(100,90,75,0.3), transparent);
        align-self: center;
      }
      .nav-item { flex: none; padding: 22px 20px; }
      .poem { padding: 20px 8px; gap: 12px; }
      .poem-vertical-wrap {
        min-height: clamp(240px, 50vh, 460px);
        gap: 10px;
      }
      .poem-head {
        height: clamp(240px, 50vh, 460px);
      }
      .poem .title {
        font-size: clamp(14px, 3vw, 18px);
      }
      .poem .line {
        font-size: clamp(20px, 4.5vw, 26px);
        height: clamp(240px, 50vh, 460px);
        max-width: min(78vw, 12em);
      }
      .poem .line.collapsed {
        max-width: min(78vw, 12em);
      }
      .poem .line.expanded {
        max-width: min(92vw, 28em);
      }
      .poem .meta {
        font-size: clamp(12px, 2.8vw, 14px);
      }
    }

    @media (max-width: 600px) {
      .nav-item .seal { width: 48px; height: 48px; font-size: 20px; }
      .nav-item .name { letter-spacing: 0.2rem; }
      .poem {
        padding: 18px 8px;
      }
      .poem-vertical-wrap {
        min-height: clamp(220px, 46vh, 380px);
        gap: 8px;
      }
      .poem-head {
        height: clamp(220px, 46vh, 380px);
      }
      .poem .line {
        height: clamp(220px, 46vh, 380px);
      }
    }
  </style>
</head>
<body class="auth-pending">
<video class="video-bg" autoplay muted loop playsinline preload="auto" aria-hidden="true">
  <source src="/assets/ink-bg-loop.mp4" type="video/mp4">
</video>

<div class="shell">
  <div class="topbar">
    <div class="brand">
      <h1>骁遥骑士</h1>
      <div class="slogan">行到水穷处 坐看云起时</div>
    </div>
    <div class="clock">
      <div class="date" id="date"></div>
      <div class="time" id="time"></div>
    </div>
  </div>

  <div class="main-area">
    <div class="poem">
      <div class="poem-vertical-wrap">
        <div class="poem-head">
          <div class="title">每日一诗</div>
          <button class="poem-action-btn poem-refresh-btn" id="poemRefreshBtn" title="换一首">↻</button>
          <button class="poem-action-btn poem-toggle" id="poemToggle" title="展开全文" style="display:none;">↕</button>
        </div>
        <div class="line" id="poemLine"></div>
        <div class="meta" id="poemMeta"></div>
      </div>
    </div>
  </div>

  <div class="nav-row">
    <a class="nav-item" href="/trading/">
      <div class="seal">易</div>
      <div class="name">交易记录</div>
      <div class="desc">交易流水 · 统计分析 · 复盘改进</div>
    </a>
    <div class="nav-separator"></div>
    <a class="nav-item" href="/notes/">
      <div class="seal">笔</div>
      <div class="name">知识笔记</div>
      <div class="desc">日记文档 · 待办管理 · 回收站</div>
    </a>
    <div class="nav-separator"></div>
    <a class="nav-item" href="/ledger/">
      <div class="seal">账</div>
      <div class="name">账务管理</div>
      <div class="desc">账户分类 · 流水管理 · 收支汇总</div>
    </a>
    <div class="nav-separator"></div>
    <a class="nav-item" href="/monitor/" id="monitorNavItem">
      <div class="seal">监</div>
      <div class="name">网站监控</div>
      <div class="desc">CPU 内存 磁盘 网络 · 实时监控</div>
    </a>
  </div>
</div>

<button class="logout-btn" id="logoutBtn" title="退出登录">
  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
    <polyline points="16 17 21 12 16 7"/>
    <line x1="21" y1="12" x2="9" y2="12"/>
  </svg>
</button>

<script>
  const bgVideo = document.querySelector('.video-bg');
  if (bgVideo) {
    bgVideo.play().catch(() => {});
  }

  const POEMS = [
    { text: '岱宗夫如何？齐鲁青未了。\n造化钟神秀，阴阳割昏晓。\n荡胸生曾云，决眦入归鸟。\n会当凌绝顶，一览众山小。', title: '望岳', author: '杜甫' },
    { text: '君不见黄河之水天上来，奔流到海不复回。\n君不见高堂明镜悲白发，朝如青丝暮成雪。\n人生得意须尽欢，莫使金樽空对月。\n天生我材必有用，千金散尽还复来。\n烹羊宰牛且为乐，会须一饮三百杯。\n岑夫子，丹丘生，将进酒，杯莫停。\n与君歌一曲，请君为我倾耳听。\n钟鼓馔玉不足贵，但愿长醉不愿醒。\n古来圣贤皆寂寞，惟有饮者留其名。\n陈王昔时宴平乐，斗酒十千恣欢谑。\n主人何为言少钱，径须沽取对君酌。\n五花马，千金裘，呼儿将出换美酒，与尔同销万古愁。', title: '将进酒', author: '李白' },
    { text: '明月几时有？把酒问青天。\n不知天上宫阙，今夕是何年。\n我欲乘风归去，又恐琼楼玉宇，高处不胜寒。\n起舞弄清影，何似在人间。\n转朱阁，低绮户，照无眠。\n不应有恨，何事长向别时圆？\n人有悲欢离合，月有阴晴圆缺，此事古难全。\n但愿人长久，千里共婵娟。', title: '水调歌头', author: '苏轼' },
    { text: '莫听穿林打叶声，何妨吟啸且徐行。\n竹杖芒鞋轻胜马，谁怕？一蓑烟雨任平生。\n料峭春风吹酒醒，微冷，山头斜照却相迎。\n回首向来萧瑟处，归去，也无风雨也无晴。', title: '定风波', author: '苏轼' },
    { text: '大江东去，浪淘尽，千古风流人物。\n故垒西边，人道是，三国周郎赤壁。\n乱石穿空，惊涛拍岸，卷起千堆雪。\n江山如画，一时多少豪杰。\n遥想公瑾当年，小乔初嫁了，雄姿英发。\n羽扇纶巾，谈笑间，樯橹灰飞烟灭。\n故国神游，多情应笑我，早生华发。\n人生如梦，一尊还酹江月。', title: '念奴娇·赤壁怀古', author: '苏轼' },
    { text: '醉里挑灯看剑，梦回吹角连营。\n八百里分麾下炙，五十弦翻塞外声，沙场秋点兵。\n马作的卢飞快，弓如霹雳弦惊。\n了却君王天下事，赢得生前身后名。可怜白发生。', title: '破阵子', author: '辛弃疾' },
    { text: '北国风光，千里冰封，万里雪飘。\n望长城内外，惟余莽莽；大河上下，顿失滔滔。\n山舞银蛇，原驰蜡象，欲与天公试比高。\n须晴日，看红装素裹，分外妖娆。\n江山如此多娇，引无数英雄竞折腰。\n惜秦皇汉武，略输文采；唐宗宋祖，稍逊风骚。\n一代天骄，成吉思汗，只识弯弓射大雕。\n俱往矣，数风流人物，还看今朝。', title: '沁园春·雪', author: '毛泽东' },
    { text: '钟山风雨起苍黄，百万雄师过大江。\n虎踞龙盘今胜昔，天翻地覆慨而慷。\n宜将剩勇追穷寇，不可沽名学霸王。\n天若有情天亦老，人间正道是沧桑。', title: '七律·人民解放军占领南京', author: '毛泽东' }
  ];

  (async () => {
    try {
      const res = await fetch('/api/auth/check');
      const data = await res.json();
      if (!data.authenticated) {
        location.href = '/login';
        return;
      }
      document.body.classList.remove('auth-pending');
      if (!data.is_admin) {
        const monitorNav = document.getElementById('monitorNavItem');
        if (monitorNav) {
          monitorNav.style.display = 'none';
        }
      }
      fetch('/api/audit/track', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: '/', module: 'portal', detail: 'portal home' }),
      }).catch(() => {});
    } catch {
      location.href = '/login';
    }
  })();

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/auth/logout', { method: 'POST' });
    location.href = '/login';
  });

  function dayOfYear(d) {
    const start = new Date(d.getFullYear(), 0, 0);
    const diff = d - start;
    return Math.floor(diff / 86400000);
  }

  function updateTime() {
    const now = new Date();
    const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const d = String(now.getDate()).padStart(2, '0');
    const w = weekdays[now.getDay()];
    document.getElementById('date').textContent = `${y} 年 ${m} 月 ${d} 日  星期${w}`;

    const h = String(now.getHours()).padStart(2, '0');
    const min = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('time').textContent = `${h}:${min}:${s}`;
  }

  function renderPoemObject(p) {
    const poemLine = document.getElementById('poemLine');
    const poemToggle = document.getElementById('poemToggle');
    const text = (p && p.text ? String(p.text) : '').trim();
    const title = (p && p.title ? String(p.title) : '无题').trim();
    const author = (p && p.author ? String(p.author) : '佚名').trim();
    const source = (p && p.source ? String(p.source) : '本地').trim();
    poemLine.textContent = text || '暂时没有可展示的诗词';
    document.getElementById('poemMeta').textContent = `《${title}》 · ${author} · ${source}`;
    const isLong = poemLine.textContent.length > 70 || poemLine.textContent.split('\n').length > 3;
    poemLine.classList.remove('expanded');
    poemLine.classList.toggle('collapsed', isLong);
    poemToggle.classList.remove('expanded');
    poemToggle.style.display = isLong ? 'inline-flex' : 'none';
    poemToggle.title = '展开全文';
    poemToggle.onclick = () => {
      const opened = !poemLine.classList.contains('collapsed');
      if (opened) {
        poemLine.classList.remove('expanded');
        poemLine.classList.add('collapsed');
        poemToggle.classList.remove('expanded');
        poemToggle.title = '展开全文';
      } else {
        poemLine.classList.remove('collapsed');
        poemLine.classList.add('expanded');
        poemToggle.classList.add('expanded');
        poemToggle.title = '收起全文';
      }
    };
  }

  function renderPoemByIndex(idx) {
    const p = POEMS[idx % POEMS.length];
    renderPoemObject(p);
  }

  async function fetchOnlinePoem(refresh = false) {
    const url = refresh ? '/api/poem/daily?refresh=1' : '/api/poem/daily';
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error(`poem api ${res.status}`);
    return await res.json();
  }

  function randomNextIndex(currentIdx) {
    if (POEMS.length <= 1) return currentIdx;
    let next = currentIdx;
    while (next === currentIdx) {
      next = Math.floor(Math.random() * POEMS.length);
    }
    return next;
  }

  updateTime();
  let currentPoemIndex = dayOfYear(new Date()) % POEMS.length;
  fetchOnlinePoem(false).then(renderPoemObject).catch(() => renderPoemByIndex(currentPoemIndex));
  document.getElementById('poemRefreshBtn').addEventListener('click', async () => {
    try {
      const poem = await fetchOnlinePoem(true);
      renderPoemObject(poem);
    } catch (_) {
      currentPoemIndex = randomNextIndex(currentPoemIndex);
      renderPoemByIndex(currentPoemIndex);
    }
  });
  setInterval(updateTime, 1000);
</script>
</body>
</html>
