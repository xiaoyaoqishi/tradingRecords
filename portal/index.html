<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人工作台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    h1 { font-size: 2.2rem; margin-bottom: 0.5rem; font-weight: 300; }
    .subtitle { color: rgba(255,255,255,0.5); margin-bottom: 3rem; font-size: 1rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 24px;
      max-width: 800px;
      width: 90%;
    }
    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 32px 24px;
      text-align: center;
      text-decoration: none;
      color: #fff;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .card:hover {
      background: rgba(255,255,255,0.15);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    }
    .card .icon { font-size: 2.8rem; margin-bottom: 16px; }
    .card .name { font-size: 1.15rem; font-weight: 500; margin-bottom: 8px; }
    .card .desc { font-size: 0.85rem; color: rgba(255,255,255,0.5); line-height: 1.5; }
    .footer {
      margin-top: 3rem;
      color: rgba(255,255,255,0.25);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <h1>个人工作台</h1>
  <p class="subtitle">选择要进入的应用</p>
  <div class="grid">
    <a class="card" href="/trading/">
      <div class="icon">📊</div>
      <div class="name">交易记录系统</div>
      <div class="desc">多品种交易记录、可视化统计与复盘分析</div>
    </a>
    <a class="card" href="#" onclick="alert('敬请期待'); return false;">
      <div class="icon">🔧</div>
      <div class="name">更多应用</div>
      <div class="desc">后续扩展的其他工具与服务</div>
    </a>
  </div>
  <div class="footer">Powered by Ubuntu + Nginx</div>
</body>
</html>
