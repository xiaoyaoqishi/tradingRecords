server {
    listen 80;
    server_name tradetrack.top www.tradetrack.top;

    # 登录页（无需认证）
    location = /login {
        root /opt/tradingRecords/portal;
        try_files /login.html =404;
    }

    # 认证检查接口（无需 cookie 即可访问）
    location /api/auth/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 首页门户
    location / {
        root /opt/tradingRecords/portal;
        index index.html;
    }

    # 交易记录系统 - 前端
    location /trading/ {
        alias /opt/tradingRecords/frontend/dist/;
        try_files $uri $uri/ /trading/index.html;
    }

    # 知识笔记 - 前端
    location /notes/ {
        alias /opt/tradingRecords/frontend-notes/dist/;
        try_files $uri $uri/ /notes/index.html;
    }

    # 服务器监控 - 前端
    location /monitor/ {
        alias /opt/tradingRecords/frontend-monitor/dist/;
        try_files $uri $uri/ /monitor/index.html;
    }

    # 后端 API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
